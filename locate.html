<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Live Wastage Tracker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f8f9fa;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.08);
            max-width: 450px;
            width: 100%;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0px 4px 10px rgba(40, 167, 69, 0.3);
        }
        button:hover {
            background-color: #218838;
            transform: translateY(-2px);
        }
        #result {
            margin-top: 25px;
            text-align: left;
            font-size: 16px;
            color: #333;
            background: #f1f3f5;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
        .report-title {
            font-size: 18px;
            font-weight: bold;
            color: #007bff;
            margin-bottom: 15px;
            border-bottom: 2px solid #dee2e6;
            padding-bottom: 5px;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .label { font-weight: 600; color: #495057; }
        .value { font-weight: bold; }
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            color: white;
        }
        .bg-danger { background-color: #dc3545; }
        .bg-warning { background-color: #ffc107; color: #212529; }
        .bg-success { background-color: #28a745; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #343a40; margin-bottom: 10px;">Smart Waste Dashboard 🌍</h2>
    <p style="color: #6c757d; margin-bottom: 25px;">Click below to get comprehensive waste analysis of your area</p>
    
    <button onclick="getLocation()">Locate My Position 📍</button>
    
    <div id="result"></div>
</div>

<script>
// மாவட்டங்களின் டீஃபால்ட் விபரங்கள் (Default Database)
const districtDatabase = {
    "Chennai": { totalTons: 1500, capacity: "2000 Tons", percentage: 75, status: "Critical", color: "bg-danger" },
    "Coimbatore": { totalTons: 650, capacity: "1000 Tons", percentage: 65, status: "Warning", color: "bg-warning" },
    "Trichy": { totalTons: 320, capacity: "800 Tons", percentage: 40, status: "Safe", color: "bg-success" },
    "Madurai": { totalTons: 580, capacity: "900 Tons", percentage: 64, status: "Warning", color: "bg-warning" }
};

function getLocation() {
    const resultDiv = document.getElementById("result");
    resultDiv.style.display = "block";
    resultDiv.innerHTML = "<div style='text-align:center;'>Fetching your live metrics... ⏳</div>";

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(fetchLiveMetrics, showError);
    } else {
        resultDiv.innerHTML = "❌ Geolocation is not supported by this browser.";
    }
}

async function fetchLiveMetrics(position) {
    const lat = position.coords.latitude;
    const lon = position.coords.longitude;
    const resultDiv = document.getElementById("result");

    try {
        // உங்க லொகேஷன் என்ன ஊர் என்று கண்டறியும் API
        const response = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`);
        const data = await response.json();
        
        const cityName = data.city || data.locality || "Unknown Location";
        
        let report;

        // ஒருவேளை நம் டேட்டாபேஸில் உள்ள ஊராக இருந்தால் அந்த விபரங்களை எடுக்கும்
        if (districtDatabase[cityName]) {
            report = districtDatabase[cityName];
        } else {
            // புதிய ஊராக இருந்தால் ஆட்டோமேட்டிக்காக ஒரு டீஃபால்ட் வேல்யூவை உருவாக்கும் (Fallback Metric)
            let randomPct = Math.floor(Math.random() * 50) + 30; // 30% to 80%
            let randomTons = Math.floor((randomPct / 100) * 500);
            let statusStr = randomPct > 70 ? "Critical" : (randomPct > 50 ? "Warning" : "Safe");
            let badgeColor = randomPct > 70 ? "bg-danger" : (randomPct > 50 ? "bg-warning" : "bg-success");

            report = {
                totalTons: randomTons,
                capacity: "500 Tons",
                percentage: randomPct,
                status: statusStr,
                color: badgeColor
            };
        }

        // HTML திரையில் விபரங்களை அழகாகக் காட்டுதல்
        resultDiv.innerHTML = `
            <div class="report-title">📍 Live Waste Report: ${cityName}</div>
            
            <div class="data-row">
                <span class="label">Coordinates:</span>
                <span class="value" style="font-size:13px; color:#6c757d;">${lat.toFixed(4)}, ${lon.toFixed(4)}</span>
            </div>
            
            <div class="data-row">
                <span class="label">Total Waste Generated:</span>
                <span class="value" style="color:#dc3545;">${report.totalTons} Tons</span>
            </div>
            
            <div class="data-row">
                <span class="label">Total Area Capacity:</span>
                <span class="value">${report.capacity}</span>
            </div>
            
            <div class="data-row">
                <span class="label">Capacity Level (%):</span>
                <span class="value">${report.percentage}%</span>
            </div>
            
            <div class="data-row" style="margin-top: 15px;">
                <span class="label">Area Status:</span>
                <span class="badge ${report.color}">${report.status}</span>
            </div>
        `;

    } catch (error) {
        resultDiv.innerHTML = "❌ Error connecting to waste metric servers.";
    }
}

function showError(error) {
    const resultDiv = document.getElementById("result");
    resultDiv.innerHTML = "❌ Unable to retrieve location permission.";
}
</script>

</body>
</html>
